<!DOCTYPE html>
<html>
    <head>
        <title>DOM Event Handling</title>
    </head>
    <body>
        <h1 id="heading">Hello Students</h1>
        <button onclick="changeText()">Click Me!</button>
        <script>
            function changeText(){
                let element = document.getElementById("heading");
                element.innerHTML = "Welcome to Java Script Class guys!!"
            }
        </script>
    </body>
</html>
