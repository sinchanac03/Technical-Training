<!DOCTYPE html>
<html>
    <head>
        <title>
            DOM Event handling
        </title>
    </head>
    <body>
        <button id="btn">Click me!</button>
        <script>
            let button = document.getElementById("btn");
            button.onclick = function()
            {
                alert("Button clicked using JavaScript!");
            }
        </script>
    </body>
</html>
