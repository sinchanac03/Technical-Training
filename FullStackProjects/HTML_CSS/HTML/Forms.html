<!DOCTYPE html>
<html>
    <head>
        <title>Forms Example</title>
    </head>
    <body>
        <form>
            <label>Name</label>
            <input type="text"> <!--no close input tag-->
            <br><br>
            <label>Email</label>
            <input type="email">
            <br><br>
            <label>Password</label>
            <input type="password">
            <br><br>
            <label>Gender</label>
            <input type="radio" name="gender"> Male <!--name is a attribute here to make sure only one of the button is clicked-->
            <input type="radio" name="gender"> Female
            <br><br>
            Skilss:
            <input type="checkbox">HTML
            <input type="checkbox">JAVA
            <input type="checkbox">CSS
            <br><br>
            <input type="submit">

        </form>
    </body>
</html>
