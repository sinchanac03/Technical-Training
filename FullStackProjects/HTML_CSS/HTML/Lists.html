<!DOCTYPE html>
<html>
    <head>
        <title>Lists tag</title>
    </head>
    <body>
        <!--Unordered lists-->
        <ul>
            <!--List items-->
            <li>Item1</li>
            <li>Item2</li>
            <li>Item3</li>
            <li>Item4</li>
        </ul>
        <!--Ordered lists-->
        <ol>
            <!--List items-->
            <li>Item1</li>
            <li>Item2</li>
            <li>Item3</li>
            <li>Item4</li>
        </ol>
    </body>
</html>
