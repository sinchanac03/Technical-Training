<!DOCTYPE html>
<html>
    <head>
        <title>My WebPage</title>
        <!--Internal CSS-->
        <style>
            /*Element Selector*/
            h1{
                color: red;
                text-align: center;
                font-family:'Courier New', Courier, monospace;
            }
            /*ID Selector*/
            #heading2{
                color: green;
                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            }

            #heading3{
                color: blue;
                font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }

            .para1{
                color: darkorange;
            }

            .para2{
                color:rgb(179, 0, 255);
            }

            .para3{
                color: deeppink;
            }
        </style>
    </head>
    <body>
        <h1 style="color:blue">Heading 1</h1>
        <h1>Testing</h1>
        <p class="para1">Lorem Ipsum is simply dummy text of the printing and typeset </p>
        <h1 id="heading2">Heading 2</h1>
        <p class="para2">Lorem Ipsum is simply dummy text of the printing and typeset </p>
        <h1 id="heading3">Heading 3</h1>
        <p class="para3">Lorem Ipsum is simply dummy text of the printing and typeset </p>
    </body>
</html>
