<!DOCTYPE html>
<html>
    <head>
        <title>Grid Example</title>
        <style>
            .container{
                font-size: 30px;
                display: grid;
                grid-template-columns: auto  auto auto ;
                background-color: chartreuse;
                padding: 30px;
            }

            .container div {
                font-size: 50px;
                border: 3px solid black;
                margin: 1px;
                text-align: center;
                background-color: aquamarine;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
        </div>
    </body>
</html>
