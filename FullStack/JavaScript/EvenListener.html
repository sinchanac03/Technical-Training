<!DOCTYPE html>
<html>
    <head>
        <title>Event Listener handler</title>
    </head>
    <body>
        <button id="btn">Click me</button>
        <script>
            let button=document.getElementById("btn");
            button.addEventListener("click",function(){
                alert("Button is clicked using addEventListener")
            });
        </script>
    </body>
</html>
